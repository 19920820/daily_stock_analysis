name: Feishu Sync
on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟跑一次
  workflow_dispatch:        # 支持手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    # 按照官方建议，强制开启 Node.js 24 运行环境
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      # 1. 升级到 v4，支持更高版本的 Node.js
      - uses: actions/checkout@v4 
      
      # 2. 升级到 v5，适配 Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run sync
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          pip install requests
          python sync_stock.py
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 核心修复：如果文件不存在，先创建一个空的，防止 git add 报错
          touch stock_list.txt
          
          git add stock_list.txt
          
          # 增加判断，只有在内容真的发生变化时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Feishu auto update" && git push)
