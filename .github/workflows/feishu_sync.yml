name: Feishu Sync
on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟跑一次
  workflow_dispatch:        # 支持手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于 push stock_list.txt
      actions: write    # 用于触发 daily_analysis
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run sync
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          pip install requests
          python sync_stock.py
          
      - name: Commit and Push
        id: git_push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch stock_list.txt
          git add stock_list.txt
          # 检查是否有变动，并设置一个 output 变量供下一步判断
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Feishu auto update"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger daily analysis workflow
        # 只有当文件真的发生变化，或者是手动点击运行时，才触发分析
        if: steps.git_push.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # 1. 准备数据
          STOCK_LIST=$(cat stock_list.txt | tr -d '[:space:]')
          if [ -z "$STOCK_LIST" ]; then
            echo "⚠️ stock_list.txt 为空，跳过触发"
            exit 0
          fi

          # 2. 构建 JSON Payload (修复了之前的转义语法错误)
          # 使用单引号包裹 python 命令，避免内部双引号冲突
          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"ref": "main", "inputs": {"mode": "stocks-only", "force_run": "false", "stock_list": os.environ["STOCKS"]}}))' env STOCKS="$STOCK_LIST")

          # 3. 发送请求 (请确保你的分析文件确实叫 daily_analysis.yml)
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_analysis.yml/dispatches" \
            -d "$PAYLOAD"
          
          echo "✅ 已成功发送触发指令给 daily_analysis.yml"
