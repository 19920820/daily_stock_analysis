name: Feishu Sync
on:
  schedule:
    # 每 5 分钟自动同步一次（UTC），避开北京时间 02:00–06:00（UTC 18:00–22:00）
    - cron: '*/5 0-17,23 * * *'
  workflow_dispatch:        # 支持手动点击按钮同步

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须开启，否则无法把更新后的 stock_list.txt 推送到仓库
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - uses: actions/checkout@v4 

      - name: Quiet hours gate (BJ 02:00–06:00)
        id: quiet_hours
        shell: bash
        run: |
          set -euo pipefail

          # 手动触发始终运行；定时触发在北京时间 02:00–06:00 跳过
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bj_hour="$(TZ='Asia/Shanghai' date +%H)"
          if [ "${bj_hour}" -ge 2 ] && [ "${bj_hour}" -lt 6 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ 定时触发：当前北京时间 ${bj_hour}:xx（02:00–06:00），跳过本次同步"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        if: ${{ steps.quiet_hours.outputs.run == 'true' }}
        with:
          python-version: '3.10'
          
      - name: Run sync
        if: ${{ steps.quiet_hours.outputs.run == 'true' }}
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          pip install requests
          python sync_stock.py
          
      - name: Commit and Push
        if: ${{ steps.quiet_hours.outputs.run == 'true' }}
        run: |
          # 配置机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 确保文件存在，避免 add 报错
          touch stock_list.txt
          
          git add stock_list.txt
          
          # 只有当飞书里的内容确实发生了变化时，才进行提交和推送
          if git diff --quiet && git diff --staged --quiet; then
            echo "没有发现新股票，无需更新。"
          else
            git commit -m "Feishu auto update"
            git push
            echo "✅ 股票列表已成功更新至仓库。"
          fi

      - name: Skipped by quiet hours
        if: ${{ steps.quiet_hours.outputs.run != 'true' }}
        run: |
          echo "已跳过：北京时间 02:00–06:00 不自动同步"
