name: 每日股票分析

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分钟运行一次
  workflow_dispatch:
    inputs:
      force_run:
        description: '手动强制运行'
        required: false
        default: true
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检查文件更新时间
        id: check_update
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            exit 0
          fi
          LAST_COMMIT_TIME=$(git log -1 --format=%ct -- stock_list.txt || echo 0)
          CURRENT_TIME=$(date +%s)
          DIFF=$((CURRENT_TIME - LAST_COMMIT_TIME))
          # 15分钟轮询，判定10分钟内更新
          if [ $DIFF -le 600 ]; then
            echo "✅ 发现近期更新，开始分析。"
          else
            echo "😴 无更新，跳过。"
            exit 0
          fi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行股票分析并推送
        env:
          # === 核心：AI 密钥 ===
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # === 核心：飞书推送配置 (必须加上这两行) ===
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # 如果你使用的是飞书应用机器人模式，还需要下面两行
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

          # === 其他必要配置 ===
          REPORT_TYPE: 'simple'
          SINGLE_STOCK_NOTIFY: 'true'
          TRADING_DAY_CHECK_ENABLED: 'false' # 既然是你手动/定时触发，建议关掉交易日检查
        run: |
          # 读取股票列表
          STOCKS=$(cat stock_list.txt | tr -d '[:space:]')
          if [ -z "$STOCKS" ]; then
            echo "❌ stock_list.txt 为空"
            exit 1
          fi
          export STOCK_LIST="$STOCKS"
          
          # 执行分析（main.py 会自动读取环境变量中的 FEISHU_WEBHOOK_URL 并推送）
          python main.py --no-market-review --force-run
